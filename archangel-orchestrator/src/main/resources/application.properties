# HTTP
quarkus.http.port=9090

# DB
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/archangel;AUTO_SERVER=TRUE
quarkus.hibernate-orm.schema-management.strategy=update

# RSS
archangel.rss.url=https://archlinux.org/feeds/news/
archangel.rss.refresh-interval=10m
archangel.api.key=dev-secret-key
# AI client
logic-api/mp-rest/url=http://localhost:8000
logic-api/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
logic-api/mp-rest/connectTimeout=3000
logic-api/mp-rest/readTimeout=10000

# Fault tolerance
quarkus.smallrye-fault-tolerance.enabled=true

# REST logging
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=500

# Health
quarkus.smallrye-health.root-path=/q/health

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.archangel".level=DEBUG
quarkus.log.file.enable=true
quarkus.log.file.path=./logs/archangel.log
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=3